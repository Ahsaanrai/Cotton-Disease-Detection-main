{% extends "base.html" %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-lg border-0 p-4" style="max-width: 450px; width: 100%; border-radius: 20px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);">
        <div class="card-body text-center">
            <div class="mb-4">
                <i class="fas fa-lock text-success" style="font-size: 3rem;"></i>
            </div>
            <h2 class="fw-bold mb-3" style="color: #1a4d2e;">Reset Password</h2>
            <p class="text-muted mb-4">Please enter your new password below.</p>
            
            <form action="{{ url_for('reset_token', token=token) }}" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <div class="form-floating mb-3">
                    <input type="password" class="form-control" id="new_password" name="new_password" placeholder="New Password" required style="border-radius: 12px;">
                    <label for="new_password">New Password</label>
                </div>
                
                <div class="form-floating mb-4">
                    <input type="password" class="form-control" id="confirm_new_password" name="confirm_new_password" placeholder="Confirm New Password" required style="border-radius: 12px;">
                    <label for="confirm_new_password">Confirm New Password</label>
                </div>
                
                <button type="submit" class="btn btn-success w-100 py-3 fw-bold shadow-sm" style="border-radius: 12px; background: #1a4d2e; border: none; transition: all 0.3s ease;">
                    Update Password
                </button>
            </form>
            
            <div class="mt-4">
                <a href="{{ url_for('login') }}" class="text-decoration-none text-success fw-bold">Back to Login</a>
            </div>
        </div>
    </div>
</div>

<style>
    .btn-success:hover {
        background: #2d6a4f !important;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(26, 77, 46, 0.3) !important;
    }
    .form-control:focus {
        border-color: #1a4d2e;
        box-shadow: 0 0 0 0.25rem rgba(26, 77, 46, 0.15);
    }
</style>
{% endblock %}
